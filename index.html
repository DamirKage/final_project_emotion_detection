<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Emotion Detector</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='mywebstyle.css') }}">
</head>
<body>
    <div class="container">
        <h1>Emotion Detector</h1>
        <p>Enter the text you want to analyze for emotions:</p>
        
        <textarea id="textToAnalyze" rows="4" placeholder="Type your text here..."></textarea>
        <br><br>
        
        <button onclick="runAnalysis()">Analyze Text</button>
        <br><br>
        
        <div id="system_response"></div>
    </div>

    <script>
        function runAnalysis() {
            // 1. Берем текст из textarea
            let textToAnalyze = document.getElementById("textToAnalyze").value;
            
            // 2. Создаем запрос
            let xhttp = new XMLHttpRequest();
            xhttp.onreadystatechange = function() {
                if (this.readyState == 4 && this.status == 200) {
                    // 3. Кладем ответ сервера в блок system_response
                    document.getElementById("system_response").innerHTML = this.responseText;
                }
            };
            
            // 4. Отправляем GET-запрос на маршрут /emotionDetector
            xhttp.open("GET", "/emotionDetector?textToAnalyze=" + encodeURIComponent(textToAnalyze), true);
            xhttp.send();
        }
    </script>
</body>
</html>
